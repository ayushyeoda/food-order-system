<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Ordering System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .cards {
            display: grid;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            color: white;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .card p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .kitchen-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .admin-card {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .customer-card {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ SmartOrder</h1>
        <p class="subtitle">Restaurant Ordering System</p>

        <div class="cards">
            <a href="/order?table=1" class="card customer-card">
                <h2>📱 Customer Order</h2>
                <p>Scan QR code to place your order</p>
            </a>

            <a href="/kitchen" class="card kitchen-card">
                <h2>👨‍🍳 Kitchen Display</h2>
                <p>View and manage incoming orders</p>
            </a>

            <a href="/admin" class="card admin-card">
                <h2>⚙️ Admin Panel</h2>
                <p>Manage menu, view reports & settings</p>
            </a>
        </div>

        <div class="footer">
            <p>© 2026 SmartOrder System | v1.0</p>
        </div>
    </div>
</body>
</html>
