<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Display</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c14; --surface:#15151f; --surface2:#1c1c28;
  --border:rgba(255,255,255,0.08); --text:#f0f0f5; --muted:rgba(240,240,245,0.45);
  --orange:#ff6b35; --green:#3ecf8e; --red:#ff4757; --amber:#f59e0b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* HEADER */
.header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 24px; height:68px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.header-left { display:flex; align-items:center; gap:14px; }
.header-logo { width:36px; height:36px; border-radius:8px; object-fit:cover; display:none; }
.header-title { font-size:1.2rem; font-weight:800; }
.live-badge { background:rgba(62,207,142,0.15); color:var(--green); font-size:0.7rem; font-weight:700; padding:4px 10px; border-radius:20px; display:flex; align-items:center; gap:5px; }
.live-dot { width:7px; height:7px; background:var(--green); border-radius:50%; animation:blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.clock { font-size:0.9rem; color:var(--muted); font-weight:600; }

/* STATS */
.stats { display:flex; gap:1px; background:var(--border); border-bottom:1px solid var(--border); }
.stat { flex:1; background:var(--surface); padding:14px 20px; }
.stat-n { font-size:2.2rem; font-weight:800; line-height:1; }
.stat-n.orange { color:var(--orange); }
.stat-n.red { color:var(--red); }
.stat-n.green { color:var(--green); }
.stat-label { font-size:0.7rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-top:3px; }

/* GRID */
.grid-wrap { padding:20px 24px; }
.orders-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:18px; }

/* ORDER CARD */
.order-card {
  background:var(--surface); border:2px solid var(--border);
  border-radius:18px; overflow:hidden; animation:fadeUp 0.3s ease;
  transition:transform 0.2s;
}
.order-card:hover { transform:translateY(-3px); }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.order-card.urgent {
  border-color:rgba(255,71,87,0.5);
  animation:fadeUp 0.3s ease, urgentPulse 2s infinite;
}
@keyframes urgentPulse {
  0%,100%{ box-shadow:0 0 0 2px rgba(255,71,87,0.2); }
  50%{ box-shadow:0 0 0 6px rgba(255,71,87,0.35); }
}

/* CARD HEADER */
.card-head {
  padding:18px 22px 14px; border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:flex-start;
}
.card-head.new-order { background:linear-gradient(135deg,rgba(255,107,53,0.12),rgba(255,107,53,0.04)); }
.table-num { font-size:2.2rem; font-weight:800; letter-spacing:-1px; line-height:1; }
.order-meta { font-size:0.75rem; color:var(--muted); margin-top:4px; }
.badges { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.badge { font-size:0.68rem; font-weight:700; padding:4px 10px; border-radius:6px; text-transform:uppercase; letter-spacing:0.5px; }
.badge-new { background:rgba(255,107,53,0.18); color:var(--orange); }
.badge-urgent { background:rgba(255,71,87,0.18); color:var(--red); animation:blinkBadge 1s infinite; }
@keyframes blinkBadge { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ITEMS */
.card-items { padding:16px 22px; }
.order-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.order-item:last-child { border:none; }
.item-name { font-size:1rem; font-weight:600; }
.item-qty { background:var(--surface2); color:var(--text); width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.88rem; font-weight:800; flex-shrink:0; }
.item-qty.big { background:var(--orange); color:white; }

/* CARD FOOTER */
.card-foot { padding:16px 22px; border-top:1px solid var(--border); background:rgba(0,0,0,0.2); }
.complete-btn {
  width:100%; padding:14px; border:none; border-radius:12px;
  background:linear-gradient(135deg,var(--green),#29b57d);
  color:white; font-size:1rem; font-weight:800; cursor:pointer;
  font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all 0.2s;
}
.complete-btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
.complete-btn:active { transform:scale(0.97); }

/* EMPTY */
.empty { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--muted); }
.empty .icon { font-size:5rem; opacity:0.3; margin-bottom:20px; }

/* NOTIFICATION POP */
.notif {
  position:fixed; top:80px; right:20px; z-index:999;
  background:var(--surface2); border:1px solid var(--border);
  padding:14px 18px; border-radius:14px; min-width:260px;
  display:flex; align-items:center; gap:12px;
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
  transform:translateX(120%); transition:transform 0.3s ease;
}
.notif.show { transform:translateX(0); }
.notif.urgent-notif { border-color:rgba(255,71,87,0.4); }
.notif-icon { font-size:1.6rem; }
.notif-msg { font-size:0.88rem; font-weight:700; }
.notif-sub { font-size:0.75rem; color:var(--muted); }

@media(max-width:768px) {
  .orders-grid { grid-template-columns:1fr; }
  .stats { flex-wrap:wrap; }
  .stat { min-width:50%; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img id="headerLogo" class="header-logo" src="" alt="">
    <div class="header-title">👨‍🍳 Kitchen</div>
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
  </div>
  <div class="clock" id="clock"></div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-n orange" id="sTotal">0</div><div class="stat-label">Active Orders</div></div>
  <div class="stat"><div class="stat-n red" id="sUrgent">0</div><div class="stat-label">Urgent</div></div>
  <div class="stat"><div class="stat-n green" id="sCompleted">0</div><div class="stat-label">Completed Today</div></div>
</div>

<div class="grid-wrap">
  <div class="orders-grid" id="ordersGrid"></div>
</div>

<div class="notif" id="notif">
  <div class="notif-icon" id="notifIcon">🔔</div>
  <div><div class="notif-msg" id="notifMsg">New Order</div><div class="notif-sub" id="notifSub"></div></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let orders = [];
let completedToday = 0;

socket.emit('join-kitchen');

// Clock
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

// Load config for logo
fetch('/api/config').then(r=>r.json()).then(cfg => {
  if (cfg.logo) {
    const el = document.getElementById('headerLogo');
    el.src = cfg.logo; el.style.display = 'block';
  }
}).catch(()=>{});

async function fetchOrders() {
  const res = await fetch('/api/orders');
  orders = await res.json();
  render();
}

function render() {
  document.getElementById('sTotal').textContent = orders.length;
  document.getElementById('sUrgent').textContent = orders.filter(o=>o.isUrgent).length;
  document.getElementById('sCompleted').textContent = completedToday;

  const grid = document.getElementById('ordersGrid');
  if (!orders.length) {
    grid.innerHTML = `<div class="empty"><div class="icon">✅</div><h3 style="font-size:1.4rem;margin-bottom:8px">All Clear!</h3><p>No pending orders</p></div>`;
    return;
  }

  const sorted = [...orders].sort((a,b) => {
    if (a.isUrgent && !b.isUrgent) return -1;
    if (!a.isUrgent && b.isUrgent) return 1;
    return new Date(a.timestamp) - new Date(b.timestamp);
  });

  grid.innerHTML = sorted.map(order => `
    <div class="order-card ${order.isUrgent?'urgent':''}" id="card-${order.id}">
      <div class="card-head new-order">
        <div>
          <div class="table-num">Table ${order.tableNumber}</div>
          <div class="order-meta">Order #${order.orderNumber} &middot; ${order.createdAt}</div>
        </div>
        <div class="badges">
          ${order.isUrgent ? '<span class="badge badge-urgent">🔴 URGENT</span>' : ''}
          <span class="badge badge-new">NEW ORDER</span>
        </div>
      </div>
      <div class="card-items">
        ${order.items.map(i => `
          <div class="order-item">
            <span class="item-name">${i.name}</span>
            <span class="item-qty ${i.quantity>2?'big':''}">${i.quantity}</span>
          </div>
        `).join('')}
      </div>
      <div class="card-foot">
        <button class="complete-btn" onclick="markComplete('${order.id}')">
          ✅ Mark as Complete
        </button>
      </div>
    </div>
  `).join('');
}

async function markComplete(orderId) {
  const btn = document.querySelector(`#card-${orderId} .complete-btn`);
  if (btn) { btn.disabled = true; btn.textContent = 'Completing...'; }
  await fetch(`/api/order/${orderId}/status`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ status:'completed' })
  });
  completedToday++;
  fetchOrders();
}

function showNotif(msg, sub, urgent) {
  const el = document.getElementById('notif');
  document.getElementById('notifIcon').textContent = urgent ? '🔴' : '🔔';
  document.getElementById('notifMsg').textContent = msg;
  document.getElementById('notifSub').textContent = sub;
  el.className = `notif ${urgent?'urgent-notif':''} show`;
  setTimeout(() => { el.className = `notif ${urgent?'urgent-notif':''}`; }, 4500);
}

socket.on('new-order', order => {
  showNotif(
    `New Order — Table ${order.tableNumber}`,
    order.isUrgent ? '⚡ URGENT — already eating!' : `${order.items?.length||0} items ordered`,
    order.isUrgent
  );
  fetchOrders();
});

socket.on('orders-update', updated => { orders = updated; render(); });
socket.on('order-status-update', () => fetchOrders());

if (Notification.permission === 'default') Notification.requestPermission();

fetchOrders();
</script>
</body>
</html>
