<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SmartOrder</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0f0f14;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,0.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.1) 0%,transparent 50%);pointer-events:none;}
.box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;width:100%;max-width:420px;backdrop-filter:blur(20px);position:relative;z-index:1;}
.logo{text-align:center;margin-bottom:32px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#f97316,#e23744);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 16px;}
.logo h1{font-size:1.5rem;font-weight:800;color:white;}
.logo p{color:rgba(255,255,255,0.45);font-size:0.85rem;margin-top:4px;}
.tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px;}
.tab-btn{flex:1;padding:10px;border:none;border-radius:9px;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.2s;color:rgba(255,255,255,0.45);background:none;}
.tab-btn.active{background:linear-gradient(135deg,#f97316,#e23744);color:white;}
.fg{margin-bottom:20px;}
label{display:block;font-size:0.75rem;font-weight:700;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.input-wrap{position:relative;}
input[type=password]{width:100%;padding:14px 18px;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.1);border-radius:12px;font-size:0.95rem;font-family:'Plus Jakarta Sans',sans-serif;color:white;outline:none;transition:border-color 0.2s;}
input[type=password]::placeholder{color:rgba(255,255,255,0.25);}
input[type=password]:focus{border-color:#f97316;}
.toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:1.1rem;}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,#f97316,#e23744);border:none;border-radius:12px;color:white;font-size:1rem;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.2s;margin-top:4px;}
.login-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.login-btn:active{transform:scale(0.98);}
.error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:12px 16px;border-radius:10px;font-size:0.85rem;font-weight:600;margin-bottom:18px;display:none;}
.error.show{display:block;}
.hint{text-align:center;color:rgba(255,255,255,0.25);font-size:0.75rem;margin-top:20px;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="box">
  <div class="logo">
    <div class="logo-icon" id="logoIcon">🍽️</div>
    <h1 id="logoName">SmartOrder</h1>
    <p>Please login to continue</p>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="setRole('admin',this)">👨‍💼 Admin</button>
    <button class="tab-btn" onclick="setRole('kitchen',this)">👨‍🍳 Kitchen</button>
  </div>
  <div class="error" id="errorMsg"></div>
  <div class="fg">
    <label>Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Enter password..." onkeydown="if(event.key==='Enter')doLogin()">
      <button class="toggle-pw" onclick="togglePw()">👁</button>
    </div>
  </div>
  <button class="login-btn" onclick="doLogin()" id="loginBtn">Login →</button>
  <div class="hint">Default admin: admin123 &nbsp;|&nbsp; kitchen: kitchen123</div>
</div>
<script>
let role = 'admin';
const params = new URLSearchParams(window.location.search);
if (params.get('role')==='kitchen') { role='kitchen'; document.querySelectorAll('.tab-btn')[1].click(); }
const nextUrl = params.get('next') || (role==='admin'?'/admin':'/kitchen');

fetch('/api/config').then(r=>r.json()).then(c=>{
  if(c.restaurantName) document.getElementById('logoName').textContent=c.restaurantName;
}).catch(()=>{});

function setRole(r, btn) {
  role=r;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function togglePw() {
  const inp=document.getElementById('password');
  inp.type=inp.type==='password'?'text':'password';
}
async function doLogin() {
  const pw = document.getElementById('password').value;
  const err = document.getElementById('errorMsg');
  const btn = document.getElementById('loginBtn');
  if (!pw) { err.textContent='Please enter password'; err.classList.add('show'); return; }
  btn.textContent='Logging in...'; btn.disabled=true;
  try {
    const res = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw,role})});
    const data = await res.json();
    if (data.success) {
      const dest = params.get('next') || (data.role==='admin'?'/admin':'/kitchen');
      window.location.href=dest;
    } else {
      err.textContent='Wrong password. Try again.'; err.classList.add('show');
      btn.textContent='Login →'; btn.disabled=false;
    }
  } catch(e) { err.textContent='Server error. Try again.'; err.classList.add('show'); btn.textContent='Login →'; btn.disabled=false; }
}
</script>
</body>
</html>
